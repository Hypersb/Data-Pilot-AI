services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - LLM_PROVIDER=none
      - CORS_ORIGINS=http://localhost:3000,http://127.0.0.1:3000,http://localhost:8501,http://127.0.0.1:8501
      - SESSION_TTL_SECONDS=7200
      - MAX_UPLOAD_MB=25
      - SAMPLES_DIR=/sample-data

  streamlit:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: streamlit run streamlit_app/main.py --server.port 8501 --server.address 0.0.0.0
    ports:
      - "8501:8501"
    environment:
      - LLM_PROVIDER=none
      - SAMPLES_DIR=/sample-data

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    profiles:
      - llm

volumes:
  ollama_data:
