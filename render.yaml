# Prisma AI — Render production (API only)
# Frontend: deploy frontend/ to Vercel (see docs/DEPLOYMENT.md)

services:
  - type: web
    name: prisma-ai-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: .
    healthCheckPath: /health
    envVars:
      - key: LLM_PROVIDER
        value: none
      - key: OLLAMA_ENABLED
        value: "false"
      - key: SESSION_TTL_SECONDS
        value: "7200"
      - key: MAX_UPLOAD_MB
        value: "25"
      - key: SAMPLES_DIR
        value: /sample-data
      - key: RATE_LIMIT_ENABLED
        value: "false"
      - key: CORS_ORIGINS
        sync: false
