name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt
      - name: Run tests
        run: python -m pytest tests/ -v --tb=short

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm install --no-audit --no-fund
      - name: Lint
        run: npm run lint
      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: https://api.example.com

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build API image
        run: docker build -f backend/Dockerfile -t prisma-ai-api:ci .
      - name: Run container and health check
        run: |
          docker run -d --name prisma-api -p 8000:8000 \
            -e PORT=8000 \
            -e LLM_PROVIDER=none \
            -e CORS_ORIGINS=https://example.vercel.app \
            prisma-ai-api:ci
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:8000/health; then
              exit 0
            fi
            sleep 3
          done
          docker logs prisma-api
          exit 1
